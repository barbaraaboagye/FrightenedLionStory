<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .status { margin-top: 10px; font-size: 0.9rem; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Speech Synthesis</h2>
    <textarea id="text-to-speak" placeholder="Type something for the AI to say..."></textarea>
    <button id="speak-btn">Speak Now</button>
    <div id="status" class="status">Idle</div>
</div>

<script>
    const speakBtn = document.getElementById('speak-btn');
    const textInput = document.getElementById('text-to-speak');
    const statusDiv = document.getElementById('status');

    // Main function to solve the speech problem
    function speak() {
        // 1. Check if the browser supports Speech Synthesis
        if (!('speechSynthesis' in window)) {
            alert("Sorry, your browser does not support speech synthesis.");
            return;
        }

        // 2. Cancel any ongoing speech to prevent overlapping
        window.speechSynthesis.cancel();

        const text = textInput.value.trim();
        if (text === "") {
            statusDiv.innerText = "Please enter some text first!";
            return;
        }

        // 3. Create the Utterance object
        const utterance = new SpeechSynthesisUtterance(text);

        // 4. Configuration (Optional)
        utterance.pitch = 1.0; 
        utterance.rate = 1.0;  
        utterance.volume = 1.0;

        // 5. Event Listeners for feedback
        utterance.onstart = () => {
            statusDiv.innerText = "Speaking...";
            speakBtn.disabled = True;
        };

        utterance.onend = () => {
            statusDiv.innerText = "Finished speaking.";
            speakBtn.disabled = False;
        };

        utterance.onerror = (event) => {
            console.error("SpeechSynthesis Error:", event);
            statusDiv.innerText = "An error occurred.";
        };

        // 6. Trigger the speech
        window.speechSynthesis.speak(utterance);
    }

    // Attach event listener to button
    speakBtn.addEventListener('click', speak);
</script>

</body>
</html>
